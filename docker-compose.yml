version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: monetizeflow_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: monetizeflow_db

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: monetizeflow_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=monetizeflow_db
      - CORS_ORIGINS=*
      - EMERGENT_LLM_KEY=sk-emergent-3367324D44e68F01aE
      - JWT_SECRET=monetizeflow_secret_key_2026_production_safe
      - RESEND_API_KEY=your_resend_api_key_here
      - SENDER_EMAIL=onboarding@resend.dev
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: monetizeflow_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
      - WDS_SOCKET_PORT=0
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  mongodb_data:
